<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>R17 Read-Only Kanban MVP</title>
    <link rel="stylesheet" href="styles.css">
    <script src="kanban.js" defer></script>
  </head>
  <body>
    <header class="topbar">
      <div>
        <p class="surface-label" id="boundary-label">Read-only Kanban MVP, not runtime</p>
        <h1 id="milestone">R17 Agentic Operating Surface, A2A Runtime, and Kanban Release Cycle</h1>
      </div>
      <div class="meta-grid" id="meta-grid" aria-label="Snapshot identity"></div>
    </header>

    <main>
      <section class="board-section" aria-labelledby="board-title">
        <div class="section-heading">
          <h2 id="board-title">Board Lanes</h2>
        </div>
        <div class="lane-board" id="lane-board"></div>
      </section>

      <section class="details-grid" aria-label="Replay and evidence">
        <article class="panel">
          <h2>Replay Summary</h2>
          <div id="replay-summary"></div>
        </article>
        <article class="panel">
          <h2>Non-Claims</h2>
          <ul class="plain-list" id="non-claims"></ul>
        </article>
        <article class="panel evidence-panel">
          <h2>Evidence Refs</h2>
          <ul class="plain-list" id="evidence-refs"></ul>
        </article>
      </section>
    </main>
  </body>
</html>
